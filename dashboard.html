<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — FranchiseHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563EB;
  --primary-dim:#2563EB1a;
  --secondary:#0F172A;
  --accent:#10B981;
  --accent-dim:#10B98126;
  --bg:#F1F5F9;
  --surface:#FFFFFF;
  --surface-2:#F8FAFC;
  --text:#111827;
  --text-muted:#5B6472;
  --border:#E2E8F0;
  --shadow: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.10);
  --radius: 18px;
  --sidebar-w: 240px;
}
html[data-theme="dark"]{
  --bg:#0B1220;
  --surface:#131C2E;
  --surface-2:#1A2538;
  --text:#EEF2F7;
  --text-muted:#93A0B4;
  --border:#243247;
  --primary-dim:#2563EB26;
  --accent-dim:#10B98126;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 32px -16px rgba(0,0,0,.55);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  min-height:100vh;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
}
a{color:inherit; text-decoration:none;}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:20;
  transition:transform .3s ease;
}
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Manrope',sans-serif;
  font-weight:800;
  font-size:16px;
}
.sidebar-header .logo-mark{
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  border-radius:12px;
  background:var(--primary-dim);
  color:var(--primary);
  font-size:18px;
}
.sidebar-nav{
  flex:1;
  padding:12px 12px;
  overflow-y:auto;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:500;
  color:var(--text-muted);
  cursor:pointer;
  transition:background .15s, color .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--primary-dim); color:var(--primary); font-weight:600;}
.nav-item .nav-icon{font-size:18px; width:24px; text-align:center;}
.nav-section{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--text-muted);
  padding:16px 14px 8px;
  opacity:.6;
}
.sidebar-footer{
  padding:16px 16px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px;
}
.sidebar-footer .avatar{
  width:36px; height:36px;
  border-radius:50%;
  background:var(--primary-dim);
  color:var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-weight:700;
  font-size:14px;
  flex-shrink:0;
}
.sidebar-footer .user-info{
  flex:1;
  min-width:0;
}
.sidebar-footer .user-name{
  font-size:13px; font-weight:600;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sidebar-footer .user-email{
  font-size:11px; color:var(--text-muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sidebar-footer .logout-btn{
  width:32px; height:32px;
  border:none; border-radius:8px;
  background:transparent;
  color:var(--text-muted);
  cursor:pointer;
  font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, color .15s;
}
.sidebar-footer .logout-btn:hover{background:var(--surface-2); color:#EF4444;}

/* Main content */
.main{
  margin-left:var(--sidebar-w);
  flex:1;
  padding:28px 32px;
  max-width:1200px;
}
.main-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:28px;
  flex-wrap:wrap;
  gap:12px;
}
.main-header h1{
  font-family:'Manrope',sans-serif;
  font-size:26px;
  line-height:1.2;
}
.main-header .greeting{
  font-size:14px;
  color:var(--text-muted);
  font-weight:400;
  display:block;
  margin-top:2px;
}
.header-actions{
  display:flex;
  gap:10px;
  align-items:center;
}

/* Header icon buttons */
.header-icon-btn{
  position:relative;
  width:38px; height:38px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:16px;
  transition:background .2s;
}
.header-icon-btn:hover{background:var(--surface-2);}
.notif-badge{
  position:absolute;
  top:-4px; right:-4px;
  min-width:18px; height:18px;
  border-radius:9px;
  background:#EF4444;
  color:#fff;
  font-size:10px;
  font-weight:700;
  display:flex; align-items:center; justify-content:center;
  padding:0 4px;
  border:2px solid var(--surface);
}

/* Notifications dropdown */
.notif-dropdown{
  position:absolute;
  top:56px; right:32px;
  width:360px;
  max-height:480px;
  overflow-y:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:0 12px 40px -8px rgba(15,23,42,.18);
  z-index:30;
  padding:8px;
}
.notif-dropdown .notif-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 12px 12px;
  border-bottom:1px solid var(--border);
  font-size:13px;
  font-weight:600;
}
.notif-dropdown .notif-header button{
  background:none;
  border:none;
  color:var(--primary);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}
.notif-item{
  display:flex;
  gap:12px;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:background .15s;
}
.notif-item:hover{background:var(--surface-2);}
.notif-item .notif-dot{
  width:8px; height:8px;
  border-radius:50%;
  background:var(--primary);
  flex-shrink:0;
  margin-top:5px;
}
.notif-item .notif-body{flex:1;}
.notif-item .notif-text{font-size:13px; margin-bottom:2px;}
.notif-item .notif-time{font-size:11px; color:var(--text-muted);}

/* Theme toggle */
.theme-toggle{
  width:38px; height:38px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:16px;
  transition:background .2s;
}
.theme-toggle:hover{background:var(--surface-2);}

/* Stats grid */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:16px;
  margin-bottom:28px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 22px;
  box-shadow:var(--shadow);
}
.stat-card .stat-label{
  font-size:13px;
  font-weight:500;
  color:var(--text-muted);
  margin-bottom:6px;
}
.stat-card .stat-value{
  font-family:'Manrope',sans-serif;
  font-size:30px;
  font-weight:800;
  line-height:1;
}
.stat-card .stat-sub{
  font-size:12px;
  color:var(--text-muted);
  margin-top:6px;
}

/* Cards */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:20px;
}
.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 22px 0;
}
.card-header h3{
  font-family:'Manrope',sans-serif;
  font-size:16px;
}
.card-header .card-link{
  font-size:13px;
  font-weight:600;
  color:var(--primary);
}
.card-body{
  padding:16px 22px 22px;
}

/* Table */
.table-wrap{overflow-x:auto;}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
table th{
  text-align:left;
  padding:10px 12px;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--text-muted);
  border-bottom:1px solid var(--border);
}
table td{
  padding:12px 12px;
  border-bottom:1px solid var(--border);
}
table tr:last-child td{border-bottom:none;}
.status-badge{
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}
.status-badge.active{background:#10B9811a; color:#10B981;}
.status-badge.draft{background:#F59E0B1a; color:#F59E0B;}
.status-badge.pending{background:#F59E0B1a; color:#F59E0B;}
.status-badge.closed{background:#EF44441a; color:#EF4444;}
.status-badge.new{background:#3B82F61a; color:#3B82F6;}
.status-badge.qualified{background:#8B5CF61a; color:#8B5CF6;}
.status-badge.converted{background:#10B9811a; color:#10B981;}

/* Listing cards */
.listing-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
}
.listing-card{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
  transition:transform .15s, box-shadow .15s;
}
.listing-card:hover{transform:translateY(-2px); box-shadow:0 8px 24px -8px rgba(15,23,42,.15);}
.listing-card .save-heart{
  position:absolute;
  top:12px; right:12px;
  width:32px; height:32px;
  border-radius:50%;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text-muted);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:14px;
  transition:all .2s;
}
.listing-card .save-heart:hover,
.listing-card .save-heart.saved{color:#EF4444; border-color:#EF4444; background:#EF44441a;}
.listing-card h4{
  font-size:15px;
  font-weight:600;
  margin-bottom:4px;
  padding-right:32px;
}
.listing-card .listing-meta{
  font-size:13px;
  color:var(--text-muted);
  margin-bottom:8px;
}
.listing-card .listing-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}
.listing-card .listing-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding-top:10px;
  border-top:1px solid var(--border);
  margin-top:8px;
  font-size:13px;
}
.listing-card .listing-value{
  font-weight:700;
  color:var(--primary);
}
.listing-card .listing-days{
  color:var(--text-muted);
  font-size:12px;
}
.tag{
  font-size:11px;
  font-weight:600;
  padding:3px 10px;
  border-radius:20px;
  background:var(--surface-2);
  color:var(--text-muted);
}

/* Interest chips */
.chip-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:500;
  background:var(--primary-dim);
  color:var(--primary);
}

/* Info rows */
.info-row{
  display:flex;
  padding:10px 0;
  border-bottom:1px solid var(--border);
  font-size:14px;
}
.info-row:last-child{border-bottom:none;}
.info-row .info-label{
  width:160px;
  flex-shrink:0;
  color:var(--text-muted);
  font-weight:500;
}
.info-row .info-value{
  flex:1;
  font-weight:500;
}
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.info-group{
  background:var(--surface-2);
  border-radius:12px;
  padding:14px 16px;
}
.info-group label{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-muted);
  display:block;
  margin-bottom:4px;
}
.info-group .value{
  font-size:15px;
  font-weight:600;
}

/* Empty state */
.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--text-muted);
}
.empty-state .empty-icon{font-size:40px; margin-bottom:12px; display:block;}
.empty-state p{font-size:14px;}

/* Loading & Error */
.loading-state, .error-state, .no-role-state{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  text-align:center;
  padding:40px;
}
.spinner{
  width:40px; height:40px;
  border:3px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state .error-icon{font-size:48px; margin-bottom:12px;}
.error-state h2{font-size:20px; margin-bottom:8px; color:#EF4444;}
.error-state p{font-size:14px; color:var(--text-muted); margin-bottom:16px;}
.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  border:none;
  border-radius:12px;
  padding:10px 20px;
  cursor:pointer;
  font-size:14px;
  transition:background .2s, transform .1s;
}
.btn-primary{background:var(--primary); color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
.btn-outline:hover{background:var(--surface-2);}
.btn-sm{padding:7px 14px; font-size:13px;}
.btn-danger{background:#EF44441a; color:#EF4444;}
.btn-danger:hover{background:#EF444426;}
.btn-icon{width:36px; height:36px; padding:0; display:inline-flex; align-items:center; justify-content:center;}

/* Hamburger */
.hamburger{
  display:none;
  width:38px; height:38px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface);
  cursor:pointer;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.sidebar-overlay{display:none;}

/* ===== BOTTOM TAB BAR (mobile) ===== */
.bottom-tabs{
  display:none;
  position:fixed;
  bottom:0; left:0; right:0;
  height:64px;
  background:var(--surface);
  border-top:1px solid var(--border);
  z-index:25;
  align-items:center;
  justify-content:space-around;
  padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bottom-tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:6px 12px;
  border-radius:12px;
  cursor:pointer;
  color:var(--text-muted);
  font-size:10px;
  font-weight:500;
  transition:color .15s, background .15s;
  min-width:56px;
  border:none;
  background:transparent;
  font-family:'Inter',sans-serif;
}
.bottom-tab .tab-icon{
  font-size:20px;
  line-height:1;
}
.bottom-tab.active{color:var(--primary);}
.bottom-tab:hover{background:var(--surface-2);}

/* ===== KANBAN BOARD ===== */
.kanban-board{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding-bottom:16px;
  scroll-snap-type:x proximity;
}
.kanban-column{
  min-width:280px;
  max-width:320px;
  flex-shrink:0;
  background:var(--surface-2);
  border-radius:16px;
  padding:12px;
  scroll-snap-align:start;
}
.kanban-column-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 4px 12px;
  font-size:13px;
  font-weight:600;
}
.kanban-column-header .stage-count{
  font-size:12px;
  font-weight:500;
  color:var(--text-muted);
  background:var(--bg);
  padding:2px 10px;
  border-radius:10px;
}
.kanban-column-droppable{
  min-height:120px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.kanban-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  box-shadow:0 1px 3px rgba(15,23,42,.06);
  cursor:pointer;
  transition:box-shadow .15s, transform .15s;
}
.kanban-card:hover{box-shadow:0 4px 12px rgba(15,23,42,.1); transform:translateY(-1px);}
.kanban-card h5{font-size:14px; font-weight:600; margin-bottom:2px;}
.kanban-card .kanban-sub{font-size:12px; color:var(--text-muted); margin-bottom:6px;}
.kanban-card .kanban-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:12px;
  padding-top:8px;
  border-top:1px solid var(--border);
}
.kanban-card .kanban-value{font-weight:700; color:var(--primary);}
.kanban-card .kanban-days{color:var(--text-muted);}

/* ===== MODAL OVERLAY ===== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--surface);
  border-radius:20px;
  max-width:640px;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  box-shadow:0 24px 64px rgba(15,23,42,.2);
  padding:24px;
}
.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.modal-header h2{font-family:'Manrope',sans-serif; font-size:18px;}
.modal-close{
  width:32px; height:32px;
  border:none; border-radius:8px;
  background:transparent;
  color:var(--text-muted);
  cursor:pointer;
  font-size:18px;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:var(--surface-2);}

/* ===== SEARCH MODAL ===== */
.search-modal{
  max-width:560px;
  padding:16px 20px;
}
.search-modal input{
  width:100%;
  padding:14px 16px;
  border:2px solid var(--border);
  border-radius:12px;
  font-size:15px;
  font-family:'Inter',sans-serif;
  background:var(--surface);
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.search-modal input:focus{border-color:var(--primary);}
.search-modal input::placeholder{color:var(--text-muted);}
.search-results{
  margin-top:8px;
  max-height:360px;
  overflow-y:auto;
}
.search-result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:background .15s;
}
.search-result-item:hover{background:var(--surface-2);}
.search-result-item .sr-icon{font-size:18px; width:24px; text-align:center;}
.search-result-item .sr-label{font-weight:500;}
.search-result-item .sr-sub{font-size:12px; color:var(--text-muted);}

/* ===== TOAST NOTIFICATIONS ===== */
.toast-container{
  position:fixed;
  bottom:24px;
  right:24px;
  z-index:200;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}
.toast{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 18px;
  border-radius:14px;
  font-size:14px;
  font-weight:500;
  box-shadow:0 8px 24px rgba(15,23,42,.15);
  pointer-events:auto;
  animation:toastIn .3s ease;
  min-width:280px;
  max-width:420px;
}
.toast-success{background:#10B981; color:#fff;}
.toast-error{background:#EF4444; color:#fff;}
.toast-info{background:var(--primary); color:#fff;}
.toast .toast-icon{font-size:18px; flex-shrink:0;}
.toast .toast-close{
  margin-left:auto;
  background:none;
  border:none;
  color:inherit;
  opacity:.7;
  cursor:pointer;
  font-size:14px;
  padding:2px;
}
@keyframes toastIn{
  from{opacity:0; transform:translateX(40px);}
  to{opacity:1; transform:translateX(0);}
}

/* ===== PROFILE COMPLETENESS METER ===== */
.profile-meter{
  padding:16px 0;
}
.profile-meter .meter-bar{
  width:100%;
  height:8px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:8px;
}
.profile-meter .meter-fill{
  height:100%;
  border-radius:4px;
  transition:width .5s ease, background .3s;
}
.profile-meter .meter-fill.high{background:#10B981;}
.profile-meter .meter-fill.medium{background:#F59E0B;}
.profile-meter .meter-fill.low{background:#EF4444;}
.profile-meter .meter-label{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:var(--text-muted);
  margin-bottom:12px;
}
.profile-meter .meter-percent{font-weight:700; color:var(--text);}
.profile-meter .meter-items{
  list-style:none;
  padding:0;
  margin:0;
}
.profile-meter .meter-items li{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 0;
  font-size:13px;
}
.profile-meter .meter-items .mi-check{color:#10B981; font-weight:700;}
.profile-meter .meter-items .mi-cross{color:#EF4444;}

/* ===== STAGE STEPPER ===== */
.stage-stepper{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 0;
  overflow-x:auto;
}
.stage-step{
  display:flex;
  align-items:center;
}
.stage-step .step-circle{
  width:32px; height:32px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
  font-weight:700;
  border:2px solid var(--border);
  color:var(--text-muted);
  background:var(--surface);
  flex-shrink:0;
  transition:all .3s;
}
.stage-step.completed .step-circle{
  background:#10B981;
  border-color:#10B981;
  color:#fff;
}
.stage-step.current .step-circle{
  background:var(--primary);
  border-color:var(--primary);
  color:#fff;
  box-shadow:0 0 0 4px var(--primary-dim);
}
.stage-step .step-label{
  font-size:11px;
  font-weight:500;
  color:var(--text-muted);
  text-align:center;
  margin-top:4px;
  white-space:nowrap;
}
.stage-step.completed .step-label{color:#10B981;}
.stage-step.current .step-label{color:var(--primary); font-weight:600;}
.step-connector{
  width:48px;
  height:2px;
  background:var(--border);
  margin:0 4px;
  margin-bottom:20px;
  flex-shrink:0;
  transition:background .3s;
}
.step-connector.completed{background:#10B981;}

/* ===== FILTER PANEL ===== */
.filter-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  margin-bottom:16px;
  overflow:hidden;
}
.filter-panel .filter-toggle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  background:none;
  border:none;
  width:100%;
  color:var(--text);
  font-family:'Inter',sans-serif;
}
.filter-panel .filter-toggle:hover{background:var(--surface-2);}
.filter-panel .filter-body{
  padding:0 18px 16px;
  display:none;
}
.filter-panel .filter-body.open{display:block;}
.filter-group{
  margin-bottom:14px;
}
.filter-group label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--text-muted);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.filter-group .filter-checkboxes{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.filter-group .filter-checkboxes label{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:400;
  text-transform:none;
  letter-spacing:0;
  color:var(--text);
  cursor:pointer;
  padding:4px 10px;
  border-radius:8px;
  background:var(--surface-2);
  transition:background .15s;
}
.filter-group .filter-checkboxes label:hover{background:var(--border);}
.filter-group .filter-checkboxes input[type="checkbox"]{accent-color:var(--primary);}
.filter-group .filter-range{
  display:flex;
  gap:8px;
  align-items:center;
}
.filter-group .filter-range input[type="range"]{
  flex:1;
  accent-color:var(--primary);
}
.filter-group .filter-range .range-value{
  font-size:13px;
  font-weight:600;
  min-width:48px;
  text-align:right;
}
.filter-group select{
  width:100%;
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:13px;
  font-family:'Inter',sans-serif;
  background:var(--surface);
  color:var(--text);
  cursor:pointer;
  outline:none;
}

/* ===== MESSAGE / CONVERSATION UI ===== */
.messages-layout{
  display:flex;
  height:calc(100vh - 180px);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  background:var(--surface);
}
.conversation-list{
  width:320px;
  border-right:1px solid var(--border);
  overflow-y:auto;
  flex-shrink:0;
}
.conversation-list .cl-header{
  padding:16px 16px 12px;
  font-size:15px;
  font-weight:700;
  border-bottom:1px solid var(--border);
  font-family:'Manrope',sans-serif;
}
.conversation-item{
  display:flex;
  gap:12px;
  padding:14px 16px;
  cursor:pointer;
  transition:background .15s;
  border-bottom:1px solid var(--border);
}
.conversation-item:hover{background:var(--surface-2);}
.conversation-item.active{background:var(--primary-dim);}
.conversation-item .ci-avatar{
  width:42px; height:42px;
  border-radius:50%;
  background:var(--primary-dim);
  color:var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-weight:700;
  font-size:14px;
  flex-shrink:0;
}
.conversation-item .ci-body{flex:1; min-width:0;}
.conversation-item .ci-name{
  font-size:14px;
  font-weight:600;
  margin-bottom:2px;
}
.conversation-item .ci-preview{
  font-size:13px;
  color:var(--text-muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.conversation-item .ci-meta{
  text-align:right;
  flex-shrink:0;
}
.conversation-item .ci-time{
  font-size:11px;
  color:var(--text-muted);
  display:block;
}
.conversation-item .ci-unread{
  background:var(--primary);
  color:#fff;
  font-size:10px;
  font-weight:700;
  min-width:18px; height:18px;
  border-radius:9px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:4px;
}
.message-thread{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}
.message-thread .mt-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.message-thread .mt-header .mt-name{font-weight:600; font-size:14px;}
.message-thread .mt-header .mt-status{font-size:12px; color:var(--text-muted);}
.message-thread .mt-body{
  flex:1;
  overflow-y:auto;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
  word-wrap:break-word;
}
.message-bubble.sent{
  align-self:flex-end;
  background:var(--primary);
  color:#fff;
  border-bottom-right-radius:4px;
}
.message-bubble.received{
  align-self:flex-start;
  background:var(--surface-2);
  color:var(--text);
  border-bottom-left-radius:4px;
}
.message-bubble .msg-time{
  font-size:10px;
  opacity:.7;
  display:block;
  margin-top:4px;
  text-align:right;
}
.message-thread .mt-input{
  padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex;
  gap:10px;
}
.message-thread .mt-input input{
  flex:1;
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  background:var(--surface-2);
  color:var(--text);
  outline:none;
}
.message-thread .mt-input input:focus{border-color:var(--primary);}
.message-thread .mt-input .mt-send{
  width:40px; height:40px;
  border:none; border-radius:10px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  transition:background .2s;
}
.message-thread .mt-input .mt-send:hover{background:#1d4ed8;}

/* ===== LOADING SKELETON ===== */
.skeleton{
  background:var(--surface-2);
  border-radius:8px;
  animation:skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-text{height:14px; margin-bottom:8px; width:80%;}
.skeleton-text.short{width:50%;}
.skeleton-text.long{width:100%;}
.skeleton-avatar{
  width:42px; height:42px;
  border-radius:50%;
}
.skeleton-card{
  padding:18px;
  border-radius:16px;
  background:var(--surface);
  border:1px solid var(--border);
}
.skeleton-card .skeleton{margin-bottom:8px;}
@keyframes skeletonPulse{
  0%,100%{opacity:1;}
  50%{opacity:.4;}
}

/* ===== UTILITY CLASSES ===== */
.flex{display:flex;}
.flex-between{display:flex; align-items:center; justify-content:space-between;}
.gap-8{gap:8px;}
.gap-12{gap:12px;}
.gap-16{gap:16px;}
.mt-8{margin-top:8px;}
.mt-12{margin-top:12px;}
.mt-16{margin-top:16px;}
.mb-8{margin-bottom:8px;}
.mb-12{margin-bottom:12px;}
.mb-16{margin-bottom:16px;}
.text-center{text-align:center;}
.text-muted{color:var(--text-muted);}
.fw-600{font-weight:600;}
.fw-700{font-weight:700;}
.fs-12{font-size:12px;}
.fs-13{font-size:13px;}
.fs-14{font-size:14px;}
.hidden{display:none!important;}

/* ===== RESPONSIVE ===== */
@media (max-width:820px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,.4);
    z-index:15;
  }
  .sidebar-overlay.show{display:block;}
  .main{margin-left:0; padding:20px 16px; padding-bottom:80px;}
  .hamburger{display:flex;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .info-grid{grid-template-columns:1fr;}
  .listing-grid{grid-template-columns:1fr;}
  .bottom-tabs{display:flex;}
  .toast-container{
    bottom:80px;
    right:16px;
    left:16px;
  }
  .toast{min-width:0; max-width:100%;}
  .notif-dropdown{
    position:fixed;
    top:auto; right:0; left:0; bottom:64px;
    width:100%;
    max-height:50vh;
    border-radius:16px 16px 0 0;
  }
  .messages-layout{flex-direction:column; height:auto;}
  .conversation-list{width:100%; border-right:none; max-height:240px;}
  .kanban-column{min-width:240px;}
  .stage-stepper{justify-content:flex-start;}
  .search-modal{margin:0 12px;}
  .profile-meter .meter-items{display:grid; grid-template-columns:1fr 1fr; gap:4px;}
}

@media (max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .main-header h1{font-size:20px;}
  .stat-card .stat-value{font-size:24px;}
  .header-actions{gap:6px;}
  .kanban-column{min-width:200px;}
  .modal{padding:16px; max-height:90vh;}
  .conversation-item{padding:12px 14px;}
  .message-bubble{max-width:85%;}
}
</style>
</head>
<body>

<!-- Mobile bottom tab bar -->
<nav class="bottom-tabs" id="bottomTabs"></nav>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo-mark">F</span>
    FranchiseHub
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="avatar" id="userAvatar">U</div>
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail">...</div>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Log out">↩</button>
  </div>
</aside>

<!-- Main Content -->
<div class="main" id="mainContent">
  <div class="main-header">
    <div class="header-left" style="display:flex; align-items:center; gap:12px;">
      <button class="hamburger" id="hamburgerBtn">☰</button>
      <h1 id="pageTitle">Dashboard <span class="greeting" id="greeting"></span></h1>
    </div>
    <div class="header-actions">
      <button class="header-icon-btn" id="globalSearchBtn" title="Search (Ctrl+K)">🔍</button>
      <button class="header-icon-btn" id="notifBtn" title="Notifications">
        🔔
        <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">◐</button>
    </div>
  </div>

  <!-- Notifications dropdown -->
  <div class="notif-dropdown" id="notifDropdown" style="display:none;"></div>

  <!-- Global search modal -->
  <div class="modal-overlay" id="searchModal" style="display:none;">
    <div class="modal search-modal">
      <input type="text" id="searchInput" placeholder="Search brands, listings, people..." autofocus>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- Dashboard content area -->
  <div id="dashboardContent"></div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Modal container for dynamic modals -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal" id="modalContent"></div>
</div>

<script src="js/auth-client.js"></script>
<script src="js/dashboard-api.js"></script>
<script src="js/dashboard-shared.js"></script>
<script src="js/dashboard-franchisee.js"></script>
<script src="js/dashboard-franchisor.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  App.initTheme();
  document.getElementById('themeToggle').addEventListener('click', App.toggleTheme);
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/sign-out', { method: 'POST' });
    window.location.href = 'auth.html';
  });
  document.getElementById('notifBtn').addEventListener('click', App.toggleNotifications);
  document.getElementById('globalSearchBtn').addEventListener('click', App.openGlobalSearch);
  window.addEventListener('hashchange', App.handleHashChange);
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      App.openGlobalSearch();
    }
    if (e.key === 'Escape') {
      document.getElementById('modalOverlay').style.display = 'none';
      document.getElementById('searchModal').style.display = 'none';
    }
  });
  App.init();
});
</script>
</body>
</html>
